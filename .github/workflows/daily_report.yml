name: ETF Daily Report

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 升級至 v4
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 升級至 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r v2/requirements.txt

      - name: Run ETF Analysis
        run: |
          echo '```' > report.txt
          python v2/main.py pd --tk watchlist >> report.txt
          echo '```' >> report.txt

      - name: Commit History Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add v2/data/history.json
          git commit -m "Auto-update ETF history [skip ci]" || echo "No changes to commit"
          git push

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 - <<EOF
          import os, requests
          if os.path.exists('report.txt'):
              with open('report.txt', 'r') as f:
                  content = f.read()
              webhook_url = os.getenv('DISCORD_WEBHOOK')
              if webhook_url:
                  requests.post(webhook_url, json={"content": content})
          EOF