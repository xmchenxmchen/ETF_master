name: ETF Daily Report

on:
  schedule:
    - cron: "30 1,4 * * *"
  workflow_dispatch: {}

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 升級至 v4
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 升級至 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r v2/requirements.txt

      - name: Run ETF Analysis
        working-directory: ./v2 
        run: |
          # 1. 初始化報告檔案並寫入 Markdown 開頭
          echo '```' > ../report.txt
          
          # 2. 執行第一個指令 (Price Analysis)
          echo "--- Price Analysis ---" >> ../report.txt
          python main.py pd --tk watchlist >> ../report.txt
          
          # 3. 寫入 Markdown 結尾
          echo '```' >> ../report.txt

      - name: Commit History Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 僅暫存 history.json，避免把 report.txt 存入
          git add v2/data/history.json
          
          # 2. 檢查是否有變動，若有才提交
          if ! git diff --cached --exit-code; then
            git commit -m "Auto-update ETF history [skip ci]"
            # 3. 使用 rebase 拉取遠端最新變動，解決衝突
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes in history.json, skipping commit."
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 - <<EOF
          import os, requests
          if os.path.exists('report.txt'):
              with open('report.txt', 'r') as f:
                  content = f.read()
              webhook_url = os.getenv('DISCORD_WEBHOOK')
              if webhook_url:
                  requests.post(webhook_url, json={"content": content})
          EOF