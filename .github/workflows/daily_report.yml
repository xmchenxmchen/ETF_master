name: ETF Daily Report

on:
  schedule:
    - cron: "30 1,4 * * *"
  workflow_dispatch: {}

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r v2/requirements.txt

      - name: Run ETF Analysis
        working-directory: ./v2
        run: python main.py pd --tk watchlist

      - name: Generate Static Dashboard
        working-directory: ./v2
        run: python generate_snapshot.py

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add v2/data/history.json docs/
          if ! git diff --cached --exit-code; then
            git commit -m "Auto-update ETF snapshot [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes, skipping commit."
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 - <<EOF
          import os, json, requests

          webhook_url = os.getenv('DISCORD_WEBHOOK')
          if not webhook_url:
              print("No webhook configured")
              exit(0)

          summary_path = 'docs/summary.json'
          if not os.path.exists(summary_path):
              requests.post(webhook_url, json={"content": "ETF Daily Report 完成（無摘要資料）"})
              exit(0)

          with open(summary_path) as f:
              s = json.load(f)

          lines = [
              f"**ETF Daily Report** — {s['generated_at']}",
              f"{s['ok']}/{s['total']} 標的更新成功",
          ]

          td = s.get('top_discount')
          if td:
              lines.append(f"折價最大：{td['ticker']} ({td['pd']:+.2f}%)")
          tp = s.get('top_premium')
          if tp:
              lines.append(f"溢價最大：{tp['ticker']} ({tp['pd']:+.2f}%)")
          tv = s.get('top_vol')
          if tv:
              lines.append(f"爆量冠軍：{tv['ticker']} ({tv['vol_ratio']:.1f}x)")

          lines += ["", "https://xmchenxmchen.github.io/ETF_master/"]

          requests.post(webhook_url, json={"content": "\n".join(lines)})
          EOF
